name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run setup
        run: ./setup.sh

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build SDK
        run: ./gradlew :sdk:assembleRelease

      - name: Run unit tests
        run: ./gradlew :sdk:testReleaseUnitTest

      - name: Build demo APK
        run: ./gradlew :app:assembleRelease

      - name: Publish to GitHub Packages
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository -PVERSION_NAME=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sdk/build/outputs/aar/sdk-release.aar
            app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
